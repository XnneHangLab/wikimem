name: Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Install
        run: uv sync # pinned ruff (dev group) — reproducible formatting
      - name: ruff format
        run: uv run ruff format --check .

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Install
        run: uv sync # ty + pinned ruff resolve from the venv
      - name: ty check
        run: uv run ty check --error-on-warning
      - name: ruff check
        run: uv run ruff check .

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # The ">= 3.11, unlike memu-py" promise (lab ADR-0002), enforced.
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: uv sync
      - name: Run tests
        run: uv run pytest -q
